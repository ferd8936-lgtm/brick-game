<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survival Brick Breaker - Gugudan Stage</title>
    <style>
        /* 폰트 적용 */
        @font-face {
            font-family: 'NexonGothic';
            src: url('NexonLv2Gothic_2.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --danger-color: #ef4444;
            --success-color: #10b981;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'NexonGothic', 'Pretendard', sans-serif;
            transition: background-color 0.5s ease;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text-color);
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .stat-item {
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }

        .hidden { display: none !important; }

        .btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            background: var(--accent-color);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            font-family: 'NexonGothic', sans-serif;
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.95); }

        .quiz-options .btn {
            font-size: 1.75rem; /* 사이즈 약 30% 축소 (기존 2.5rem) */
            font-weight: bold;
            padding: 4px 10px; /* 네모 사이즈 축소 */
        }

        .paddle-option {
            display: inline-block;
            width: 60px;
            height: 60px;
            line-height: 60px;
            font-size: 2.2rem;
            margin: 10px;
            border-radius: 15px;
            cursor: pointer;
            border: 3px solid transparent;
            background: #1e293b;
            transition: transform 0.2s;
        }
        .paddle-option.selected { border-color: var(--accent-color); transform: scale(1.1); }

        /* 단계 선택 버튼 스타일: 가로 2줄(4개씩) 배치 및 30% 축소 */
        .stage-btn-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            justify-content: center;
            gap: 6px;
            margin-top: 15px;
            max-width: 320px;
        }
        
        .stage-btn {
            padding: 5px 8px; /* 30% 축소 반영 */
            background: #1e293b;
            border: 2px solid var(--accent-color);
            color: white;
            border-radius: 6px;
            font-family: 'NexonGothic', sans-serif;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.65rem; /* 글자 크기 축소 */
        }
        .stage-btn:hover, .stage-btn:active {
            background: var(--accent-color);
            color: #0f172a;
        }

        #quiz-timer-box {
            font-size: 2.5rem;
            color: var(--danger-color);
            font-weight: bold;
            margin-bottom: 20px;
        }
        #quiz-question { font-size: 2.5rem; margin-bottom: 30px; font-weight: bold;}
        .quiz-options { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

        .emoji { font-size: 4rem; margin-bottom: 20px; }
    </style>
</head>
<body>

    <audio id="bgm" loop src="https://assets.mixkit.co/music/preview/mixkit-happy-loop-139.mp3"></audio>

    <div id="game-container">
        <div id="ui-layer">
            <div class="stat-item">단계: <span id="stage-display">1</span> / 8</div>
            <div class="stat-item">점수: <span id="score-display">0</span></div>
        </div>
        
        <canvas id="gameCanvas"></canvas>

        <div id="start-overlay" class="overlay">
            <div class="emoji">🎮</div>
            <h1>아이니와 벽돌 깨기</h1>
            <div>
                <!-- 캐릭터를 직업군(의사, 판사, 변호사)으로 변경 -->
                <div class="paddle-option" onclick="selectPaddle('doctor')">👨‍⚕️</div>
                <div class="paddle-option" onclick="selectPaddle('judge')">👨‍⚖️</div>
                <div class="paddle-option" onclick="selectPaddle('lawyer')">🧑‍💼</div>
            </div>
            <p>캐릭터를 선택하세요!</p>
            <button class="btn" onclick="startGame(1)">게임 시작</button>
            
            <p style="margin-top:20px; font-size: 0.9rem; color: #cbd5e1;">바로 단계를 선택해서 시작할 수도 있어요!</p>
            <div class="stage-btn-container">
                <button class="stage-btn" onclick="startGame(1)">1단계</button>
                <button class="stage-btn" onclick="startGame(2)">2단계</button>
                <button class="stage-btn" onclick="startGame(3)">3단계</button>
                <button class="stage-btn" onclick="startGame(4)">4단계</button>
                <button class="stage-btn" onclick="startGame(5)">5단계</button>
                <button class="stage-btn" onclick="startGame(6)">6단계</button>
                <button class="stage-btn" onclick="startGame(7)">7단계</button>
                <button class="stage-btn" onclick="startGame(8)">8단계</button>
            </div>
        </div>

        <div id="quiz-overlay" class="overlay hidden">
            <div id="quiz-timer-box">10</div>
            <div id="quiz-question">2 X 3 = ?</div>
            <div class="quiz-options" id="quiz-options"></div>
        </div>

        <div id="result-overlay" class="overlay hidden">
            <div id="result-emoji" class="emoji">🎉</div>
            <h1 id="result-title">축하해요!</h1>
            <p id="result-msg">1단계를 통과했어요!</p>
            <button id="result-btn" class="btn" onclick="handleResultBtn()">다음 단계로</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const stageDisplay = document.getElementById('stage-display');
        
        const startOverlay = document.getElementById('start-overlay');
        const quizOverlay = document.getElementById('quiz-overlay');
        const resultOverlay = document.getElementById('result-overlay');
        const quizTimerBox = document.getElementById('quiz-timer-box');
        
        let score = 0;
        let currentStage = 1;
        let isGameOver = false;
        let isPaused = false;
        let lastTime = 0;
        let quizTimeRemaining = 10;
        let quizInterval;
        
        let correctAnswers = 0; 
        let bonusItem = { x: 0, y: 0, dy: 4, radius: 15, dropped: false, caught: false };
        let isPiercing = false;
        let piercingBounces = 0; 
        let brokenQuizBricks = 0; 
        let itemDropThreshold = 0; 

        const stageThemes = [
            { bg: 'radial-gradient(circle, #1e293b, #0f172a)', brickStart: '#f472b6', brickEnd: '#be185d', accent: '#38bdf8' },
            { bg: 'radial-gradient(circle, #065f46, #064e3b)', brickStart: '#fbbf24', brickEnd: '#d97706', accent: '#34d399' },
            { bg: 'radial-gradient(circle, #7f1d1d, #450a0a)', brickStart: '#fb923c', brickEnd: '#ea580c', accent: '#f87171' },
            { bg: 'radial-gradient(circle, #4c1d95, #2e1065)', brickStart: '#22d3ee', brickEnd: '#0891b2', accent: '#a78bfa' },
            { bg: 'radial-gradient(circle, #713f12, #422006)', brickStart: '#fde047', brickEnd: '#ca8a04', accent: '#fbbf24' },
            { bg: 'radial-gradient(circle, #0369a1, #0c4a6e)', brickStart: '#38bdf8', brickEnd: '#0284c7', accent: '#7dd3fc' },
            { bg: 'radial-gradient(circle, #374151, #111827)', brickStart: '#f3f4f6', brickEnd: '#9ca3af', accent: '#6b7280' },
            { bg: 'radial-gradient(circle, #450a0a, #000000)', brickStart: '#ef4444', brickEnd: '#7f1d1d', accent: '#dc2626' }
        ];

        const paddle = {
            width: 120,
            height: 20,
            x: 0,
            y: 0,
            color: '#94a3b8', 
            type: 'doctor' // 기본값 변경
        };

        const ball = {
            x: 0,
            y: 0,
            radius: 8,
            dx: 0,
            dy: 0,
            speed: 7.8,
            color: '#ffffff'
        };

        let bricks = [];
        const brickConfig = {
            rows: 3,
            cols: 8,
            padding: 8,
            offsetTop: 70,
            height: 35
        };

        function applyTheme() {
            const theme = stageThemes[currentStage - 1];
            document.documentElement.style.setProperty('--bg-color', 'transparent'); 
            document.body.style.background = theme.bg;
            document.documentElement.style.setProperty('--accent-color', theme.accent);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initBricks();
            initPositions();
        }

        window.addEventListener('resize', resize);

        function selectPaddle(type) {
            paddle.type = type;
            document.querySelectorAll('.paddle-option').forEach(el => el.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        function initBricks() {
            const totalPadding = brickConfig.padding * (brickConfig.cols + 1);
            brickConfig.width = (canvas.width - totalPadding) / brickConfig.cols;

            bricks = [];
            const dan = currentStage + 1;
            let quizPool = [];
            for(let i=1; i<=9; i++) {
                quizPool.push({ q: `${dan} X ${i} = ?`, a: dan * i });
            }
            quizPool.sort(() => Math.random() - 0.5);

            let totalBricks = brickConfig.rows * brickConfig.cols;
            let indices = Array.from({length: totalBricks}, (_, i) => i);
            indices.sort(() => Math.random() - 0.5);
            let quizIndices = indices.slice(0, 9); 

            let count = 0;
            let quizCount = 0;
            for (let r = 0; r < brickConfig.rows; r++) {
                bricks[r] = [];
                for (let c = 0; c < brickConfig.cols; c++) {
                    let hasQuiz = quizIndices.includes(count);
                    let quizData = hasQuiz ? quizPool[quizCount++] : null;
                    
                    bricks[r][c] = { status: 1, hasQuiz: hasQuiz, quiz: quizData };
                    count++;
                }
            }
        }

        function initPositions() {
            paddle.x = (canvas.width - paddle.width) / 2;
            paddle.y = canvas.height - 100;
            ball.x = canvas.width / 2;
            ball.y = paddle.y - 15;
            ball.dx = ball.speed * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = -ball.speed;
        }

        function movePaddle(e) {
            if (isPaused || isGameOver) return;
            let relativeX = (e.type.includes('touch')) ? e.touches[0].clientX : e.clientX;
            paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, relativeX - paddle.width / 2));
        }

        document.addEventListener('mousemove', movePaddle);
        document.addEventListener('touchmove', movePaddle, { passive: false });

        function startGame(selectedStage) {
            if (selectedStage) currentStage = selectedStage;
            startOverlay.classList.add('hidden');
            document.getElementById('bgm').play().catch(() => {}); 
            resetGameState();
            requestAnimationFrame(gameLoop);
        }

        function resetGameState() {
            isGameOver = false;
            isPaused = false;
            score = 0;
            correctAnswers = 0;
            bonusItem.dropped = false;
            bonusItem.caught = false;
            isPiercing = false;
            piercingBounces = 0;
            brokenQuizBricks = 0;
            itemDropThreshold = 4;
            scoreDisplay.textContent = '0';
            stageDisplay.textContent = currentStage;
            applyTheme();
            resize();
        }

        function triggerQuiz(quizData, brick) {
            isPaused = true;
            quizOverlay.classList.remove('hidden');
            document.getElementById('quiz-question').textContent = quizData.q;
            
            const options = [quizData.a];
            while(options.length < 3) {
                let wrong = quizData.a + Math.floor(Math.random() * 10) - 5;
                if (wrong > 0 && !options.includes(wrong)) options.push(wrong);
            }
            options.sort(() => Math.random() - 0.5);

            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';
            options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'btn';
                b.textContent = opt;
                b.onclick = () => checkQuizAnswer(opt, quizData.a);
                optionsContainer.appendChild(b);
            });

            quizTimeRemaining = 10;
            quizTimerBox.textContent = quizTimeRemaining;
            clearInterval(quizInterval);
            quizInterval = setInterval(() => {
                quizTimeRemaining--;
                quizTimerBox.textContent = quizTimeRemaining;
                if (quizTimeRemaining <= 0) {
                    clearInterval(quizInterval);
                    failQuiz("시간 초과! 아쉽네요 😢");
                }
            }, 1000);
        }

        function checkQuizAnswer(selected, correct) {
            clearInterval(quizInterval);
            if (selected === correct) {
                isPaused = false;
                quizOverlay.classList.add('hidden');
                correctAnswers++;
                if (correctAnswers >= 9) {
                    handleStageClearLogic();
                }
            } else {
                failQuiz("정답이 아니에요! 아쉬워요 😢");
            }
        }

        function failQuiz(msg) {
            isGameOver = true;
            quizOverlay.classList.add('hidden');
            showResult("아쉽습니다...", msg, "😢", "다시 해보기", () => location.reload());
        }

        function showResult(title, msg, emoji, btnText, action) {
            resultOverlay.classList.remove('hidden');
            document.getElementById('result-title').textContent = title;
            document.getElementById('result-msg').textContent = msg;
            document.getElementById('result-emoji').textContent = emoji;
            const btn = document.getElementById('result-btn');
            btn.textContent = btnText;
            btn.onclick = action;
        }

        function handleResultBtn() {
            if (currentStage < 8) {
                currentStage++;
                stageDisplay.textContent = currentStage;
                correctAnswers = 0;
                bonusItem.dropped = false;
                bonusItem.caught = false;
                isPiercing = false;
                piercingBounces = 0;
                brokenQuizBricks = 0;
                itemDropThreshold = 4;
                applyTheme();
                initBricks();
                initPositions();
                resultOverlay.classList.add('hidden');
                isPaused = false;
            } else {
                location.reload();
            }
        }

        function handleStageClearLogic() {
            isPaused = true;
            if (currentStage === 8) {
                showResult("최종 클리어!", "모든 단계를 정복했어요! 정말 멋진 구구단 마스터네요! 🎉", "🏆", "처음부터 다시하기", () => location.reload());
            } else {
                showResult("스테이지 클리어!", `${currentStage}단계를 통과했어요! 아주 잘했어요! 🎉`, "👏", "다음 단계로", handleResultBtn);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const theme = stageThemes[currentStage - 1];

            ctx.shadowBlur = 8;
            ctx.shadowColor = 'rgba(0, 0, 0, 0.6)';

            for (let r = 0; r < brickConfig.rows; r++) {
                for (let c = 0; c < brickConfig.cols; c++) {
                    const b = bricks[r][c];
                    if (b.status === 1) {
                        const bx = c * (brickConfig.width + brickConfig.padding) + brickConfig.padding;
                        const by = r * (brickConfig.height + brickConfig.padding) + brickConfig.offsetTop;
                        
                        const grad = ctx.createLinearGradient(bx, by, bx, by + brickConfig.height);
                        if (b.hasQuiz) {
                            grad.addColorStop(0, '#fef08a');
                            grad.addColorStop(1, '#b45309');
                            ctx.shadowColor = '#fbbf24';
                        } else {
                            grad.addColorStop(0, theme.brickStart);
                            grad.addColorStop(1, theme.brickEnd);
                            ctx.shadowColor = 'rgba(0, 0, 0, 0.6)';
                        }

                        ctx.beginPath();
                        ctx.roundRect(bx, by, brickConfig.width, brickConfig.height, 4);
                        ctx.fillStyle = grad;
                        ctx.fill();
                        
                        if (b.hasQuiz) {
                            ctx.strokeStyle = '#fef08a';
                            ctx.lineWidth = 2;
                        } else {
                            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                            ctx.lineWidth = 1;
                        }
                        ctx.stroke();
                        ctx.closePath();

                        if(b.hasQuiz) {
                            ctx.shadowBlur = 0; 
                            ctx.fillStyle = "white";
                            ctx.font = "bold 20px NexonGothic"; 
                            ctx.textAlign = "center";
                            ctx.fillText("?", bx + brickConfig.width/2, by + brickConfig.height/1.5);
                            ctx.shadowBlur = 8; 
                        }
                    }
                }
            }

            ctx.shadowBlur = 0;

            if (bonusItem.dropped && !bonusItem.caught) {
                ctx.beginPath();
                ctx.arc(bonusItem.x, bonusItem.y, bonusItem.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#fde047';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.closePath();
            }

            if (isPiercing) {
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#fef08a';
            }

            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 10);
            ctx.fillStyle = paddle.color; 
            ctx.fill();
            ctx.closePath();
            
            ctx.shadowBlur = 0; 

            // 선택한 직업 캐릭터 이모티콘 렌더링
            let jobEmoji = '👨‍⚕️'; 
            if(paddle.type === 'judge') jobEmoji = '👨‍⚖️';
            if(paddle.type === 'lawyer') jobEmoji = '🧑‍💼';

            const cx = paddle.x + paddle.width / 2;
            const cy = paddle.y + paddle.height + 25; // 패들 아래 위치 조정
            
            ctx.font = "30px Arial";
            ctx.textAlign = "center";
            ctx.fillText(jobEmoji, cx, cy);

            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.closePath();
        }

        function update() {
            if (isGameOver || isPaused) return;

            if (bonusItem.dropped && !bonusItem.caught) {
                bonusItem.y += bonusItem.dy;
                if (bonusItem.y + bonusItem.radius > paddle.y && 
                    bonusItem.y - bonusItem.radius < paddle.y + paddle.height &&
                    bonusItem.x > paddle.x && bonusItem.x < paddle.x + paddle.width) {
                    bonusItem.caught = true;
                    isPiercing = true; 
                    piercingBounces = 3; 
                }
            }

            ball.x += ball.dx;
            ball.y += ball.dy;

            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) ball.dx = -ball.dx;
            if (ball.y - ball.radius < 0) ball.dy = -ball.dy;

            if (ball.y + ball.radius > canvas.height) {
                isGameOver = true;
                showResult("게임 종료", "공을 놓쳤어요! 다시 도전해볼까요?", "😢", "다시 해보기", () => location.reload());
                return;
            }

            if (ball.y + ball.radius > paddle.y && ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
                let hitPoint = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
                ball.dx = hitPoint * ball.speed;
                if (Math.abs(ball.dx) < 1.5) {
                    ball.dx += (Math.random() > 0.5 ? 1.5 : -1.5);
                }
                ball.dy = -Math.abs(ball.dy);
                if (isPiercing) {
                    piercingBounces--;
                    if (piercingBounces <= 0) isPiercing = false;
                }
            }

            for (let r = 0; r < brickConfig.rows; r++) {
                for (let c = 0; c < brickConfig.cols; c++) {
                    const b = bricks[r][c];
                    if (b.status === 1) {
                        const bx = c * (brickConfig.width + brickConfig.padding) + brickConfig.padding;
                        const by = r * (brickConfig.height + brickConfig.padding) + brickConfig.offsetTop;

                        if (ball.x > bx && ball.x < bx + brickConfig.width && ball.y > by && ball.y < by + brickConfig.height) {
                            if (!isPiercing) ball.dy = -ball.dy;
                            b.status = 0;
                            score += 10;
                            scoreDisplay.textContent = score;
                            if (b.hasQuiz) {
                                brokenQuizBricks++;
                                if (brokenQuizBricks === itemDropThreshold && !bonusItem.dropped) {
                                    bonusItem.dropped = true;
                                    bonusItem.x = bx + brickConfig.width / 2;
                                    bonusItem.y = by + brickConfig.height / 2;
                                }
                                triggerQuiz(b.quiz, b);
                            }
                        }
                    }
                }
            }
        }

        function gameLoop(timestamp) {
            update();
            draw();
            if (!isGameOver) requestAnimationFrame(gameLoop);
        }

        selectPaddle('doctor'); 
        resize();

    </script>
</body>
</html>
